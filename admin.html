<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dashboard (Dark)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0a0f1d',
                        darkcard: '#131b2f',
                        darkaccent: '#0ea5e9',
                        darkhover: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkbg min-h-screen font-sans text-gray-300 antialiased selection:bg-darkaccent selection:text-white">
    <div id="app" class="max-w-7xl mx-auto p-6" v-cloak>
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 bg-darkcard p-6 rounded-2xl shadow-lg border border-gray-800">
            <div class="mb-4 md:mb-0">
                <h1 class="text-3xl font-extrabold text-white flex items-center tracking-tight">
                    <span class="text-darkaccent mr-3">{</span> Portfolio CMS <span class="text-darkaccent ml-2">}</span>
                </h1>
                <p class="text-gray-400 mt-2 font-medium">Manage all sections and visual content instantly.</p>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/index.html" target="_blank" class="text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 px-4 py-3 rounded-xl font-medium transition-all shadow-inner">
                    <i class="fas fa-external-link-alt mr-2"></i> Live Preview
                </a>
                <button @click="saveData" :disabled="isSaving" 
                        class="bg-darkaccent hover:bg-sky-400 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-sky-900/50 transition-all flex items-center transform hover:scale-105 active:scale-95">
                    <i class="fas fa-save mr-2" :class="{'fa-spin fa-spinner': isSaving}"></i> 
                    {{ isSaving ? 'Saving Data...' : 'Save & Deploy' }}
                </button>
            </div>
        </header>

        <div v-if="loading" class="text-center py-32">
            <i class="fas fa-circle-notch fa-spin text-5xl text-darkaccent mb-4"></i>
            <p class="text-xl text-gray-400 font-medium">Decrypting mainframe data...</p>
        </div>

        <div v-else class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar Navigation -->
            <div class="lg:col-span-3">
                <div class="bg-darkcard rounded-2xl shadow-lg border border-gray-800 p-4 sticky top-6">
                    <nav class="space-y-2">
                        <button @click="activeTab = 'general'" :class="{'bg-darkhover text-white border-l-4 border-darkaccent shadow-sm': activeTab === 'general', 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200 border-l-4 border-transparent': activeTab !== 'general'}" class="w-full text-left px-5 py-4 rounded-lg transition-all flex items-center font-medium">
                            <i class="fas fa-sliders-h mr-3 w-6 text-center" :class="activeTab === 'general' ? 'text-darkaccent' : 'text-gray-500'"></i> General Site Config
                        </button>
                        <button @click="activeTab = 'projects'" :class="{'bg-darkhover text-white border-l-4 border-darkaccent shadow-sm': activeTab === 'projects', 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200 border-l-4 border-transparent': activeTab !== 'projects'}" class="w-full text-left px-5 py-4 rounded-lg transition-all flex items-center font-medium">
                            <i class="fas fa-project-diagram mr-3 w-6 text-center" :class="activeTab === 'projects' ? 'text-darkaccent' : 'text-gray-500'"></i> Projects
                        </button>
                        <button @click="activeTab = 'experience'" :class="{'bg-darkhover text-white border-l-4 border-darkaccent shadow-sm': activeTab === 'experience', 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200 border-l-4 border-transparent': activeTab !== 'experience'}" class="w-full text-left px-5 py-4 rounded-lg transition-all flex items-center font-medium">
                            <i class="fas fa-briefcase mr-3 w-6 text-center" :class="activeTab === 'experience' ? 'text-darkaccent' : 'text-gray-500'"></i> Experience
                        </button>
                        <button @click="activeTab = 'certifications'" :class="{'bg-darkhover text-white border-l-4 border-darkaccent shadow-sm': activeTab === 'certifications', 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200 border-l-4 border-transparent': activeTab !== 'certifications'}" class="w-full text-left px-5 py-4 rounded-lg transition-all flex items-center font-medium">
                            <i class="fas fa-certificate mr-3 w-6 text-center" :class="activeTab === 'certifications' ? 'text-darkaccent' : 'text-gray-500'"></i> Certifications
                        </button>
                    </nav>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="lg:col-span-9 relative">
                <!-- SUCCESS MESSAGE -->
                <transition name="fade">
                    <div v-if="message" class="bg-emerald-900/60 border border-emerald-500/50 text-emerald-300 p-4 mb-6 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.2)] flex justify-between absolute w-full top-[-10px] z-10 backdrop-blur-sm">
                        <p class="font-medium flex items-center"><i class="fas fa-check-circle mr-3 text-emerald-400"></i> {{ message }}</p>
                        <button @click="message=''" class="text-emerald-400 hover:text-emerald-200 transition-colors"><i class="fas fa-times text-lg"></i></button>
                    </div>
                </transition>

                <!-- GENERAL SETTINGS TAB -->
                <div v-if="activeTab === 'general'" class="bg-darkcard rounded-2xl shadow-xl border border-gray-800 p-8 line-animation" :class="{'mt-16': message}">
                    <div class="flex items-center mb-8 border-b border-gray-700 pb-5">
                        <div class="bg-gray-800 p-3 rounded-lg mr-4 text-darkaccent"><i class="fas fa-sliders-h text-xl"></i></div>
                        <h2 class="text-2xl font-bold text-white">General Information</h2>
                    </div>
                    
                    <div class="space-y-8" v-if="data.general">
                        <!-- Names -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-800/30 rounded-xl border border-gray-700/50">
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">First Name</label>
                                <input v-model="data.general.first_name" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Last Name / Highlighed</label>
                                <input v-model="data.general.last_name" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                            </div>
                        </div>

                        <!-- Hero Roles -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-800/30 rounded-xl border border-gray-700/50">
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Backend Hero Tag <span class="text-sky-400 ml-2"><i class="fas fa-server"></i></span></label>
                                <input v-model="data.general.dev_tag" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                <label class="block text-sm font-semibold text-gray-400 mb-2 mt-4 uppercase tracking-wider">Backend Description</label>
                                <textarea v-model="data.general.dev_desc" rows="4" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Security Hero Tag <span class="text-emerald-400 ml-2"><i class="fas fa-shield-alt"></i></span></label>
                                <input v-model="data.general.sec_tag" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                <label class="block text-sm font-semibold text-gray-400 mb-2 mt-4 uppercase tracking-wider">Security Description</label>
                                <textarea v-model="data.general.sec_desc" rows="4" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all"></textarea>
                            </div>
                        </div>

                        <!-- About Texts -->
                        <div class="p-6 bg-gray-800/30 rounded-xl border border-gray-700/50">
                            <h3 class="text-lg font-bold text-white mb-4 border-b border-gray-700 pb-2">About Section Texts</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">About (Backend)</label>
                                    <textarea v-model="data.general.about_dev" rows="5" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all"></textarea>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">About (Security)</label>
                                    <textarea v-model="data.general.about_sec" rows="5" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Social Links -->
                        <div class="p-6 bg-gray-800/30 rounded-xl border border-gray-700/50">
                            <h3 class="text-lg font-bold text-white mb-4 border-b border-gray-700 pb-2">Social & Links</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider"><i class="fab fa-linkedin text-[#0a66c2] mr-1"></i> LinkedIn URL</label>
                                    <input v-model="data.general.linkedin_url" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider"><i class="fab fa-github text-white mr-1"></i> GitHub URL</label>
                                    <input v-model="data.general.github_url" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider"><i class="fab fa-instagram text-pink-500 mr-1"></i> Instagram URL</label>
                                    <input v-model="data.general.instagram_url" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider"><i class="fas fa-envelope text-red-500 mr-1"></i> Contact Email</label>
                                    <input v-model="data.general.email_address" type="email" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PROJECTS TAB -->
                <div v-if="activeTab === 'projects'" class="bg-darkcard rounded-2xl shadow-xl border border-gray-800 p-8 line-animation" :class="{'mt-16': message}">
                    <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-5">
                        <div class="flex items-center">
                            <div class="bg-gray-800 p-3 rounded-lg mr-4 text-darkaccent"><i class="fas fa-project-diagram text-xl"></i></div>
                            <h2 class="text-2xl font-bold text-white">Manage Projects</h2>
                        </div>
                        <button @click="addProject" class="bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 border border-sky-500/30 px-5 py-2.5 rounded-xl font-medium transition-all flex items-center shadow-lg">
                            <i class="fas fa-plus mr-2"></i> Add Project
                        </button>
                    </div>
                    
                    <div class="space-y-6">
                        <transition-group name="list">
                            <div v-for="(item, index) in data.projects" :key="item.id || index" class="p-6 border border-gray-800 rounded-xl bg-[#0f1523] relative group hover:border-darkaccent/50 transition-colors shadow-inner">
                                <button @click="removeProject(index)" title="Remove item" class="absolute top-4 right-4 text-red-400 hover:text-white hover:bg-red-500/80 p-2.5 bg-gray-800 border border-gray-700 rounded-lg shadow-sm transition-all focus:outline-none opacity-0 group-hover:opacity-100">
                                    <i class="fas fa-trash"></i>
                                </button>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5 pr-12">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Project Title</label>
                                        <input v-model="item.title" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Category Stack</label>
                                        <select v-model="item.category" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all appearance-none cursor-pointer">
                                            <option value="dev">Backend Development (dev)</option>
                                            <option value="sec">Cybersecurity (sec)</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="mb-5">
                                    <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Detailed Description</label>
                                    <textarea v-model="item.description" rows="3" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all"></textarea>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide"><i class="fas fa-link"></i> Link URL (GitHub/Live)</label>
                                        <input v-model="item.link" type="text" placeholder="https://..." class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Tech Stack Tags (Comma separated)</label>
                                        <input :value="item.tags.join(', ')" @input="e => item.tags = e.target.value.split(',').map(t=>t.trim())" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all" placeholder="e.g. PHP, Laravel, MySQL">
                                    </div>
                                </div>
                            </div>
                        </transition-group>
                    </div>
                </div>

                <!-- EXPERIENCE TAB -->
                <div v-if="activeTab === 'experience'" class="bg-darkcard rounded-2xl shadow-xl border border-gray-800 p-8 line-animation" :class="{'mt-16': message}">
                    <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-5">
                        <div class="flex items-center">
                            <div class="bg-gray-800 p-3 rounded-lg mr-4 text-darkaccent"><i class="fas fa-briefcase text-xl"></i></div>
                            <h2 class="text-2xl font-bold text-white">Manage Experience</h2>
                        </div>
                        <button @click="addExperience" class="bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 border border-sky-500/30 px-5 py-2.5 rounded-xl font-medium transition-all flex items-center shadow-lg">
                            <i class="fas fa-plus mr-2"></i> Add Experience
                        </button>
                    </div>
                    
                    <div class="space-y-6">
                        <transition-group name="list">
                            <div v-for="(item, index) in data.experience" :key="item.id || index" class="p-6 border border-gray-800 rounded-xl bg-[#0f1523] relative group hover:border-darkaccent/50 transition-colors shadow-inner">
                                <button @click="removeExperience(index)" title="Remove item" class="absolute top-4 right-4 text-red-400 hover:text-white hover:bg-red-500/80 p-2.5 bg-gray-800 border border-gray-700 rounded-lg shadow-sm transition-all focus:outline-none opacity-0 group-hover:opacity-100">
                                    <i class="fas fa-trash"></i>
                                </button>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5 pr-12">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Role / Job Title</label>
                                        <input v-model="item.role" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Company / Organization</label>
                                        <input v-model="item.organization" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Duration / Date Range</label>
                                        <input v-model="item.date" type="text" placeholder="e.g. July 2024 — August 2024" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Category Stack</label>
                                        <select v-model="item.category" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all appearance-none cursor-pointer">
                                            <option value="dev">Backend Development (dev)</option>
                                            <option value="sec">Cybersecurity (sec)</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Key Achievements & Highlights (One per line)</label>
                                    <textarea :value="item.highlights.join('\n')" @input="e => item.highlights = e.target.value.split('\n').filter(h=>h.trim()!=='')" rows="4" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all" placeholder="- Developed an API...&#10;- Monitored network traffic..."></textarea>
                                </div>
                            </div>
                        </transition-group>
                    </div>
                </div>

                <!-- CERTIFICATIONS TAB -->
                <div v-if="activeTab === 'certifications'" class="bg-darkcard rounded-2xl shadow-xl border border-gray-800 p-8 line-animation" :class="{'mt-16': message}">
                    <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-5">
                        <div class="flex items-center">
                            <div class="bg-gray-800 p-3 rounded-lg mr-4 text-darkaccent"><i class="fas fa-certificate text-xl"></i></div>
                            <h2 class="text-2xl font-bold text-white">Manage Certifications</h2>
                        </div>
                        <button @click="addCert" class="bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 border border-sky-500/30 px-5 py-2.5 rounded-xl font-medium transition-all flex items-center shadow-lg">
                            <i class="fas fa-plus mr-2"></i> Add Cert
                        </button>
                    </div>
                    
                    <div class="space-y-6">
                        <transition-group name="list">
                            <div v-for="(item, index) in data.certifications" :key="item.id || index" class="p-6 border border-gray-800 rounded-xl bg-[#0f1523] relative group hover:border-darkaccent/50 transition-colors shadow-inner">
                                <button @click="removeCert(index)" title="Remove item" class="absolute top-4 right-4 text-red-400 hover:text-white hover:bg-red-500/80 p-2.5 bg-gray-800 border border-gray-700 rounded-lg shadow-sm transition-all focus:outline-none opacity-0 group-hover:opacity-100">
                                    <i class="fas fa-trash"></i>
                                </button>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5 pr-12">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Certification Title</label>
                                        <input v-model="item.title" type="text" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Status Badge</label>
                                        <select v-model="item.status" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all appearance-none cursor-pointer">
                                            <option value="Completed">✓ Completed</option>
                                            <option value="In Progress">⏳ In Progress</option>
                                            <option value="Academic">✓ Academic</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div>
                                    <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Issuer & Description</label>
                                    <textarea v-model="item.description" rows="2" class="w-full bg-darkhover border border-gray-700 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-darkaccent focus:border-transparent outline-none transition-all"></textarea>
                                </div>
                            </div>
                        </transition-group>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <style>
        [v-cloak] { display: none; }
        .line-animation { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        
        .list-enter-active, .list-leave-active { transition: all 0.4s ease; }
        .list-enter-from { opacity: 0; transform: translateX(-20px); }
        .list-leave-to { opacity: 0; transform: scale(0.95); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0f1d; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    loading: true,
                    isSaving: false,
                    message: '',
                    activeTab: 'general',
                    data: {
                        general: {},
                        projects: [],
                        experience: [],
                        certifications: []
                    }
                }
            },
            mounted() {
                this.fetchData();
            },
            methods: {
                async fetchData() {
                    try {
                        const res = await fetch('/api/data');
                        const json = await res.json();
                        this.data = json;
                    } catch (err) {
                        alert('Could not connect to the local CMS API. Make sure node server.js is running!');
                    } finally {
                        this.loading = false;
                    }
                },
                async saveData() {
                    this.isSaving = true;
                    this.message = '';
                    try {
                        const res = await fetch('/api/data', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.data)
                        });
                        const resData = await res.json();
                        if(resData.success) {
                            this.message = 'System database updated! The live site reflects these changes.';
                            setTimeout(() => this.message = '', 5000);
                        }
                    } catch (err) {
                        alert('Failed to save. Is the server running?');
                    } finally {
                        this.isSaving = false;
                    }
                },
                addProject() { this.data.projects.unshift({ id: Date.now(), title: '', description: '', category: 'dev', link: '', tags: [] }); },
                removeProject(index) { if (confirm('Irrevocably delete this project?')) this.data.projects.splice(index, 1); },
                addExperience() { this.data.experience.unshift({ id: Date.now(), organization: '', role: '', date: '', category: 'dev', highlights: [''] }); },
                removeExperience(index) { if (confirm('Delete this experience record?')) this.data.experience.splice(index, 1); },
                addCert() { this.data.certifications.unshift({ id: Date.now(), title: '', description: '', status: 'Completed' }); },
                removeCert(index) { if (confirm('Delete this certification?')) this.data.certifications.splice(index, 1); }
            }
        }).mount('#app');
    </script>
</body>
</html>
